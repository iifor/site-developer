services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: site-developer:latest
    container_name: portfolio
    restart: always
    env_file:
      - .env.local
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/nginx/ssl/dev.qingfu.site_nginx:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O - https://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - web

networks:
  web:
    driver: bridge
