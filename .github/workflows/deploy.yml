name: Deploy to Production

on:
  push:
    branches:
      - 'release/master-*'

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - name: Verify SSH host fingerprint
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          EXPECTED_FINGERPRINT: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail

          test -n "$DEPLOY_HOST" || {
            echo "::error::DEPLOY_HOST 未配置"
            exit 1
          }
          test -n "$EXPECTED_FINGERPRINT" || {
            echo "::error::DEPLOY_HOST_FINGERPRINT 未配置"
            exit 1
          }
          if [[ ! "$EXPECTED_FINGERPRINT" =~ ^SHA256:[A-Za-z0-9+/]+$ ]]; then
            echo "::error::DEPLOY_HOST_FINGERPRINT 必须是单行 SHA256 指纹，且不能包含空格或换行"
            exit 1
          fi

          host_keys="$(mktemp)"
          trap 'rm -f "$host_keys"' EXIT
          ssh-keyscan -T 10 -p "$DEPLOY_PORT" "$DEPLOY_HOST" \
            2>/dev/null > "$host_keys"

          test -s "$host_keys" || {
            echo "::error::无法从 $DEPLOY_HOST:$DEPLOY_PORT 获取 SSH 主机公钥"
            exit 1
          }

          echo "服务器公开的 SSH 主机指纹："
          ssh-keygen -lf "$host_keys" -E sha256

          negotiated_fingerprint="$(
            ssh-keygen -lf "$host_keys" -E sha256 \
              | awk '$NF == "(ECDSA)" { print $2; exit }'
          )"
          test -n "$negotiated_fingerprint" || {
            echo "::error::服务器未提供 drone-ssh 优先协商的 ECDSA 主机密钥"
            exit 1
          }

          if [[ "$negotiated_fingerprint" != "$EXPECTED_FINGERPRINT" ]]; then
            echo "::error::DEPLOY_HOST_FINGERPRINT 必须配置为上方 ECDSA 行的 SHA256 指纹"
            exit 1
          fi

          echo "DEPLOY_HOST_FINGERPRINT 与 drone-ssh 使用的 ECDSA 指纹匹配"

      - name: Deploy to server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          timeout: 30s
          command_timeout: 15m
          envs: DEPLOY_PATH,DEPLOY_SHA
          script: |
            set -eu

            echo "🚀 开始部署..."
            case "$DEPLOY_PATH" in
              /*) ;;
              *) echo "DEPLOY_PATH 必须是绝对路径" >&2; exit 1 ;;
            esac
            printf '%s' "$DEPLOY_SHA" | grep -Eq '^[0-9a-f]{40}$' || {
              echo "DEPLOY_SHA 格式无效" >&2
              exit 1
            }
            cd -- "$DEPLOY_PATH"

            echo "📥 拉取指定提交..."
            git fetch --no-tags origin "$DEPLOY_SHA"
            git reset --hard "$DEPLOY_SHA"
            git clean -fd

            echo "🐳 构建新镜像..."
            [ -f .env.local ] || touch .env.local
            docker compose build app

            echo "🔄 替换并验证容器..."
            if ! docker compose up -d --no-build --remove-orphans --wait --wait-timeout 60; then
              docker compose ps
              docker compose logs --tail=100 app
              exit 1
            fi

            echo "🧹 清理悬空镜像..."
            docker image prune -f

            echo "✅ 部署完成！"
