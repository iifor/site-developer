name: Deploy to Production

on:
  push:
    branches:
      - 'release/master-*'

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          timeout: 30s
          command_timeout: 15m
          envs: DEPLOY_PATH,DEPLOY_SHA
          script: |
            set -eu

            echo "🚀 开始部署..."
            case "$DEPLOY_PATH" in
              /*) ;;
              *) echo "DEPLOY_PATH 必须是绝对路径" >&2; exit 1 ;;
            esac
            printf '%s' "$DEPLOY_SHA" | grep -Eq '^[0-9a-f]{40}$' || {
              echo "DEPLOY_SHA 格式无效" >&2
              exit 1
            }
            cd -- "$DEPLOY_PATH"

            echo "📥 拉取指定提交..."
            git fetch --no-tags origin "$DEPLOY_SHA"
            git reset --hard "$DEPLOY_SHA"
            git clean -fd

            echo "🐳 构建新镜像..."
            [ -f .env.local ] || touch .env.local
            docker compose build app

            echo "🔄 替换并验证容器..."
            if ! docker compose up -d --no-build --remove-orphans --wait --wait-timeout 60; then
              docker compose ps
              docker compose logs --tail=100 app
              exit 1
            fi

            echo "🧹 清理悬空镜像..."
            docker image prune -f

            echo "✅ 部署完成！"
