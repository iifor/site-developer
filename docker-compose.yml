services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
